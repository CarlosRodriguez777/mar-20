<!DOCTYPE html>
<html>

<head>
    <title>Triángulo en plano positivo</title>
</head>

<body>

    <h2>Triángulo en plano cartesiano (X,Y positivos)</h2>

    Punto 1:
    <input id="x1" type="number">
    <input id="y1" type="number">

    <br><br>

    Punto 2:
    <input id="x2" type="number">
    <input id="y2" type="number">

    <br><br>

    Punto 3:
    <input id="x3" type="number">
    <input id="y3" type="number">

    <br><br>

    Algoritmo:
    <select id="method">
        <option value="dda">DDA</option>
        <option value="bresenham">Bresenham</option>
    </select>

    Grosor:
    <input id="size" type="number" value="3">

    <br><br>

    <button onclick="procesar()">Verificar y Dibujar</button>
    <button onclick="clearCanvas()">Limpiar</button>

    Zoom:
    <input id="zoom" type="range" min="10" max="50" value="20" oninput="zoom()">

    <p id="mensaje"></p>

    <canvas id="canvas" width="500" height="500" style="border:1px solid black"></canvas>

    <script src="6000748_V1.JS"></script>

</body>

</html>
